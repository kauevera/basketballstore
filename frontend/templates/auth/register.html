<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../../static/favicon.svg">
    <link rel="stylesheet" href="../../static/css/styles.css">
    <link rel="stylesheet" href="../../static/css/auth/auth.css">
    <title>Basketball Store - Home</title>
</head>
<body>
    <nav class="nav-bar">
        <div id="left-nav-bar">
            <button type="button" class="nav-btn" onclick="redirectDashboard()">Tela inicial</button>
        </div>
        <div id="right-nav-bar">
            <button type="button" class="nav-btn" onclick="redirectLogin()">Meus pedidos</button>
            <button type="button" class="nav-btn" onclick="redirectLogin()">Entrar ou cadastrar</button>
        </div>
    </nav>
    <hr>
    <div class="content">
        <form class="form-container" onsubmit="register(); return false;">
            <div class="form-title">
                <h3>Seja bem vindo</h3>
                <p>Crie uma conta</p>
            </div>
            <div class="form-fields">
                <div class="form-input">
                    <label>Nome</label>
                    <input type="text" id="name" placeholder="Digite o seu nome" autocomplete="name">
                </div>
                <div class="form-input">
                    <label>Idade</label>
                    <input type="number" id="age" placeholder="Digite a sua idade" min="1" max="120">
                </div>
                <div class="form-input">
                    <label>Gênero</label>
                    <select id="gender">
                        <option value="" disabled selected>Selecione o gênero</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                        <option value="N/A">N/A</option>
                    </select>
                </div>
                <div class="form-input">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Email" autocomplete="email">
                </div>
                <div class="form-input">
                    <label>Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="***********" autocomplete="new-password" oninput="updatePasswordStrength()">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')" aria-label="Mostrar senha"></button>
                    </div>
                    <div class="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <span class="strength-label" id="strength-label"></span>
                </div>
                <div class="form-input">
                    <label>Confirmar Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="***********" autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')" aria-label="Mostrar senha"></button>
                    </div>
                </div>
            </div>
            <div class="form-submit">
                <button type="submit" class="request-btn">Criar conta</button>
                <button type="button" class="form-btn" onclick="redirectLogin()">Clique aqui caso já tenha uma conta</button>
            </div>
        </form>
    </div>
</body>
<script src="../../static/js/toast.js"></script>
<script src="../../static/js/pages_redirect.js"></script>
<script src="../../static/js/auth/auth.js"></script>
</html>
