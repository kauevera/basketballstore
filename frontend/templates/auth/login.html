<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/svg+xml" href="../../static/favicon.svg">
    <link rel="stylesheet" href="../../static/css/styles.css">
    <link rel="stylesheet" href="../../static/css/auth/auth.css">
    <title>Basketball Store - Home</title>
</head>
<body>
    <nav class="nav-bar">
        <div id="left-nav-bar">
            <button type="button" class="nav-btn" onclick="redirectDashboard()">Tela inicial</button>
        </div>
        <div id="right-nav-bar">
            <button type="button" class="nav-btn" onclick="redirectLogin()">Meus pedidos</button>
            <button type="button" class="nav-btn" onclick="redirectLogin()">Entrar ou cadastrar</button>
        </div>
    </nav>
    <hr>
    <div class="content">
        <form class="form-container" onsubmit="login(); return false;">
            <div class="form-title">
                <h3>Bem vindo de volta</h3>
                <p>Entre com sua conta</p>
            </div>
            <div class="form-fields">
                <div class="form-input">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Email" autocomplete="email">
                </div>
                <div class="form-input">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
                </div>
            </div>
            <div class="form-submit">
                <button type="submit" class="request-btn">Acessar conta</button>
                <button type="button" class="form-btn" onclick="redirectRegister()">Não tem uma conta? Crie uma</button>
            </div>
        </form>
    </div>
</body>
<script src="../../static/js/pages_redirect.js"></script>
<script src="../../static/js/auth/auth.js"></script>
</html>
