<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../../static/favicon.svg">
    <link rel="stylesheet" href="../../static/css/styles.css">
    <link rel="stylesheet" href="../../static/css/auth/auth.css">
    <title>Basketball Store - Home</title>
</head>
<body>
    <nav class="nav-bar">
        <div id="left-nav-bar">
            <button type="button" class="nav-btn" onclick="redirectDashboard()">Tela inicial</button>
        </div>
        <div id="right-nav-bar">
            <button type="button" class="nav-btn" onclick="redirectLogin()">Meus pedidos</button>
            <button type="button" class="nav-btn" onclick="redirectLogin()">Entrar ou cadastrar</button>
        </div>
    </nav>
    <hr>
    <div class="content">
        <form class="form-container" onsubmit="login(); return false;">
            <div class="form-title">
                <h3>Bem vindo de volta</h3>
                <p>Entre com sua conta</p>
            </div>
            <div class="form-fields">
                <div class="form-input">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Email" autocomplete="email">
                </div>
                <div class="form-input">
                    <label>Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)" aria-label="Mostrar senha">
                            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="form-submit">
                <button type="submit" class="request-btn">Acessar conta</button>
                <button type="button" class="form-btn" onclick="redirectRegister()">Não tem uma conta? Crie uma</button>
            </div>
        </form>
    </div>
</body>
<script src="../../static/js/toast.js"></script>
<script src="../../static/js/pages_redirect.js"></script>
<script src="../../static/js/auth/auth.js"></script>
</html>
