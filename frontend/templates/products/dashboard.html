<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../../static/css/styles.css">
    <link rel="stylesheet" href="../../static/css/products/dashboard.css">
    <title>Basketball Store - Home</title>
</head>
<body>
    <nav class="nav-bar">
        <div id="left-nav-bar">
            <button type="button" class="nav-btn" onclick="redirectDashboard()">Tela inicial</button>
        </div>
        <div id="right-nav-bar">
            <button type="button" class="nav-btn" onclick="redirectLogin()">Meus pedidos</button>
            <button type="button" class="nav-btn cart-nav-btn" onclick="toggleCart()">
                Carrinho
                <span id="cart-badge" class="cart-badge" style="display:none">0</span>
            </button>
            <button type="button" class="nav-btn" onclick="logout()">Sair</button>
        </div>
    </nav>
    <hr>
    <div class="filter">
        <div class="input-container">
            <img class="search-icon" src="images/search-interface-symbol.png">
            <input class="filter-input" type="text" placeholder="Filtrar produtos" autofocus>
        </div>
        <div class="categories-list">
            <button type="button" class="filter-btn">Categoria 1</button>
            <button type="button" class="filter-btn">Categoria 2</button>
            <button type="button" class="filter-btn">Categoria 3</button>
            <button type="button" class="filter-btn">Categoria 4</button>
        </div>
    </div>
    <div class="content">
        <div id="products-grid"></div>
    </div>

    <div id="product-modal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeProductModal()">✕</button>
            <div class="modal-body">
                <img src="images/bag.png" class="modal-img" alt="produto">
                <div class="modal-info">
                    <h2 id="modal-name"></h2>
                    <p id="modal-price" class="modal-price"></p>
                    <p id="modal-availability" class="modal-tag"></p>
                </div>
            </div>
            <div class="modal-actions">
                <button class="request-btn" onclick="addCurrentToCart()">Adicionar ao carrinho</button>
                <button class="request-btn buy-btn" onclick="buyNow()">Comprar agora</button>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closePaymentModal()">✕</button>
            <h3 class="modal-title">Forma de pagamento</h3>
            <div id="payment-methods-list" class="payment-methods-list"></div>
            <button class="request-btn" onclick="confirmOrder()">Confirmar pedido</button>
        </div>
    </div>

    <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Carrinho</h3>
            <button class="modal-close" onclick="toggleCart()">✕</button>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
            <p id="cart-total" class="cart-total"></p>
            <button class="request-btn" onclick="openPaymentFromCart()">Finalizar pedido</button>
        </div>
    </div>
</body>
<script src="../../static/js/pages_redirect.js"></script>
<script src="../../static/js/auth/auth.js"></script>
<script src="../../static/js/cart/cart.js"></script>
<script src="../../static/js/products/dashboard.js"></script>
</html>
